<script>
// Storage shim — talks to a Netlify Function backed by Netlify Blobs,
// with the same get/set/list shape the tool originally used.
const Storage = {
  async get(key){
    const res = await fetch('/api/data?key=' + encodeURIComponent(key));
    if(!res.ok) throw new Error('get failed: ' + res.status);
    const data = await res.json();
    if(data.value === null || data.value === undefined) throw new Error('not found');
    return { value: data.value };
  },
  async set(key, value){
    const res = await fetch('/api/data', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ key, value })
    });
    if(!res.ok) throw new Error('set failed: ' + res.status);
    return await res.json();
  },
  async list(prefix){
    const res = await fetch('/api/data?prefix=' + encodeURIComponent(prefix));
    if(!res.ok) throw new Error('list failed: ' + res.status);
    return await res.json();
  }
};
</script>

<script>
const EMPLOYEES = ["Sanjay","Dinesh","Prem","Vijay","Shravani","Kasturi","Soni","Sangita"];
const STATUS_COLORS = {
  present: {bg:'#639922', bgLight:'#EAF3DE', label:'Present'},
  absent:  {bg:'#E24B4A', bgLight:'#FCEBEB', label:'Absent'},
  late:    {bg:'#378ADD', bgLight:'#E6F1FB', label:'Late'},
  half:    {bg:'#EF9F27', bgLight:'#FAEEDA', label:'Half day'}
};
const STATUS_CELL = {
  present: {bg:'#EAF3DE', text:'#27500A', letter:'P'},
  absent:  {bg:'#FCEBEB', text:'#791F1F', letter:'A'},
  half:    {bg:'#FAEEDA', text:'#633806', letter:'H'},
  late:    {bg:'#E6F1FB', text:'#0C447C', letter:'L'}
};
let state = {}; // { name: { status:'present', time:'' } }

function resetState(){
  state = {};
  EMPLOYEES.forEach(n=> state[n] = {status:'present', time:''});
}
resetState();

function todayStr(){ return new Date().toISOString().slice(0,10); }
document.getElementById('dateInput').value = todayStr();

function fmtDate(d){
  const dt = new Date(d+'T00:00:00');
  const dd = String(dt.getDate()).padStart(2,'0');
  const mm = String(dt.getMonth()+1).padStart(2,'0');
  const yy = String(dt.getFullYear()).slice(2);
  const day = dt.toLocaleDateString('en-US',{weekday:'long'});
  return {ddmmyy: dd+'/'+mm+'/'+yy, day};
}
function dmy(iso){
  const [y,m,d] = iso.split('-');
  return d+'/'+m+'/'+y.slice(2);
}
function monthName(d){
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US',{month:'long',year:'numeric'});
}

function setStatus(name, status){
  state[name].status = status;
  if(status !== 'late') state[name].time = '';
  renderGrid();
  updateMsg();
}
function setTime(name, val){
  state[name].time = val;
  updateMsg();
}

const TIME_OPTIONS = (()=>{
  const opts = [];
  for(let h=7; h<=18; h++){
    for(let m=0; m<60; m+=15){
      opts.push(String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'));
    }
  }
  return opts;
})();

function renderGrid(){
  const grid = document.getElementById('employeeGrid');
  grid.innerHTML = EMPLOYEES.map(name=>{
    const st = state[name];
    const btns = ['present','absent','late','half'].map(key=>{
      const c = STATUS_COLORS[key];
      const active = st.status === key;
      return `<button onclick="setStatus('${name}','${key}')" style="padding:6px 12px;border:1px solid ${active?c.bg:'#D9D2C0'};background:${active?c.bg:'#fff'};color:${active?'#fff':'#5F5E5A'};border-radius:4px;cursor:pointer;font-size:12px;font-weight:${active?'600':'400'};">${c.label}</button>`;
    }).join('');
    const timeBox = st.status==='late'
      ? `<select onchange="setTime('${name}', this.value)" style="padding:5px 8px;border:1px solid #378ADD;border-radius:4px;font-size:12px;margin-left:6px;">
          <option value="">Select time</option>
          ${TIME_OPTIONS.map(t=>`<option value="${t}" ${st.time===t?'selected':''}>${t}</option>`).join('')}
        </select>`
      : '';
    const rowBg = STATUS_COLORS[st.status].bgLight;
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${rowBg};border-radius:6px;">
      <span style="min-width:90px;font-weight:600;font-size:14px;">${name}</span>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">${btns}</div>
      ${timeBox}
    </div>`;
  }).join('');
}

function updateMsg(){
  const d = document.getElementById('dateInput').value;
  const {ddmmyy, day} = fmtDate(d);
  const mName = monthName(d);
  const m = +document.getElementById('teaMorning').value || 0;
  const e = +document.getElementById('teaEvening').value || 0;
  const s = +document.getElementById('teaSir').value || 0;
  const total = m+e+s;
  document.getElementById('teaTotal').textContent = total;

  const absentList = EMPLOYEES.filter(n=>state[n].status==='absent');
  const lateList = EMPLOYEES.filter(n=>state[n].status==='late');
  const halfList = EMPLOYEES.filter(n=>state[n].status==='half');
  const expenseTotal = expenses.reduce((a,ex)=>a+ex.amount,0);

  let msg = `*MUSTER CARD FOR ${mName.toUpperCase()}*\n`;
  msg += `*DATE : ${ddmmyy} (${day})\n`;
  msg += `*ABSENT PEOPLE LIST\n`;
  msg += (absentList.length ? absentList.map((n,i)=>`${i+1}. ${n}`).join('\n') : 'None') + '\n';
  msg += `*PEOPLE COMING* AFTER 10 AM\n`;
  msg += (lateList.length ? lateList.map((n,i)=>`${i+1}. ${n} (${state[n].time||'-'})`).join('\n') : 'None') + '\n';
  msg += `**HALF DAY\n`;
  msg += (halfList.length ? halfList.join('\n') : 'None') + '\n\n';
  msg += `***TEA***\n`;
  msg += `Morning :- ${m}\n`;
  msg += `Evening :- ${e}\n`;
  msg += `Sir : - ${s}\n`;
  msg += `Total : - ${total}\n\n`;
  msg += `***EXPENSES***\n`;
  msg += (expenses.length ? expenses.map(ex=>`${ex.desc} - ${inr(ex.amount)}`).join('\n') : 'None') + '\n';
  msg += `Total : - ${inr(expenseTotal)}\n\n`;
  msg += `***COURIER DELIVERIES***\n`;
  msg += (couriers.length ? couriers.map(c=>`${c.sender} - ${c.boxes} box(es)/bag(s) - ${c.company}`).join('\n') : 'None');

  document.getElementById('waMsg').value = msg;

  // Visual card — status table
  document.getElementById('waCardTitle').textContent = 'MUSTER CARD — ' + mName.toUpperCase();
  document.getElementById('waCardDate').textContent = ddmmyy + ' (' + day + ')';
  document.getElementById('waCardTable').innerHTML = EMPLOYEES.map(n=>{
    const st = state[n];
    const c = STATUS_CELL[st.status];
    const timeLine = st.status==='late' ? `<div style="font-size:10px;">${st.time||''}</div>` : '';
    return `<tr style="border-bottom:1px solid #EDE8DA;">
      <td style="padding:6px 8px;font-size:13px;">${n}</td>
      <td style="padding:4px 8px;text-align:center;background:${c.bg};color:${c.text};font-weight:700;font-size:13px;">${c.letter}${timeLine}</td>
    </tr>`;
  }).join('');

  document.getElementById('waCardTea').innerHTML =
    `Morning: ${m} &nbsp;•&nbsp; Evening: ${e} &nbsp;•&nbsp; Sir: ${s} &nbsp;•&nbsp; <b>Total: ${total}</b>`;

  document.getElementById('waCardExpenses').innerHTML = expenses.length
    ? expenses.map(ex=>`${ex.desc} — <b>${inr(ex.amount)}</b>`).join('<br>') + `<div style="margin-top:4px;font-weight:700;">Total: ${inr(expenseTotal)}</div>`
    : 'None';

  document.getElementById('waCardCouriers').innerHTML = couriers.length
    ? couriers.map(c=>`${c.sender} — ${c.boxes} box(es)/bag(s) — ${c.company}`).join('<br>')
    : 'None';

  // WhatsApp share link (plain text version, since WhatsApp links can't attach images directly)
  document.getElementById('shareWaLink').href = 'https://wa.me/?text=' + encodeURIComponent(msg);
}

async function renderCardToBlob(){
  const card = document.getElementById('waCard');
  const canvas = await html2canvas(card, {backgroundColor:'#ffffff', scale:2});
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

async function copyImage(){
  try{
    const blob = await renderCardToBlob();
    await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    showMsg('Image copied — paste it into WhatsApp');
  }catch(e){
    showMsg('Could not copy image directly — use Download instead', 4000);
  }
}

async function downloadImage(){
  try{
    const blob = await renderCardToBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'muster-card-' + document.getElementById('dateInput').value + '.png';
    a.click();
    URL.revokeObjectURL(url);
  }catch(e){
    showMsg('Could not generate image: ' + (e && e.message ? e.message : String(e)), 5000);
  }
}

['teaMorning','teaEvening','teaSir'].forEach(id=>{
  document.getElementById(id).addEventListener('input', updateMsg);
});
document.getElementById('dateInput').addEventListener('change', loadDay);

async function loadDay(){
  document.getElementById('editBanner').style.display = 'none';
  const d = document.getElementById('dateInput').value;
  document.getElementById('dayLabel').textContent = fmtDate(d).day;
  try{
    const r = await Storage.get('attendance:'+d);
    const data = JSON.parse(r.value);
    resetState();
    Object.keys(data.state||{}).forEach(n=>{ if(state[n]) state[n]=data.state[n]; });
    document.getElementById('teaMorning').value = data.tea?.morning||0;
    document.getElementById('teaEvening').value = data.tea?.evening||0;
    document.getElementById('teaSir').value = data.tea?.sir||0;
    expenses = data.expenses || [];
    couriers = data.couriers || [];
  }catch(e){
    resetState();
    document.getElementById('teaMorning').value=0;
    document.getElementById('teaEvening').value=0;
    document.getElementById('teaSir').value=0;
    expenses = [];
    couriers = [];
  }
  renderGrid();
  renderExpenses();
  renderCouriers();
  updateMsg();
}

async function saveDay(){
  const d = document.getElementById('dateInput').value;
  const data = {
    state,
    tea:{
      morning: +document.getElementById('teaMorning').value||0,
      evening: +document.getElementById('teaEvening').value||0,
      sir: +document.getElementById('teaSir').value||0
    },
    expenses,
    couriers,
    submittedAt: new Date().toISOString()
  };
  try{
    await Storage.set('attendance:'+d, JSON.stringify(data));
    const t = new Date(data.submittedAt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    showMsg('Saved — submitted at '+t);
  }catch(e){
    showMsg('Could not save: ' + (e && e.message ? e.message : String(e)), 6000);
  }
}

function showMsg(t, duration){
  const el = document.getElementById('msg');
  el.textContent = t; el.style.display='block';
  setTimeout(()=>el.style.display='none', duration || 2500);
}

function copyMsg(){
  const ta = document.getElementById('waMsg');
  ta.select();
  document.execCommand('copy');
  showMsg('Message copied');
}

const TABS = ['tabDaily','tabMonth'];
const VIEWS = {tabDaily:'dailyView', tabMonth:'monthView'};
function activateTab(id){
  TABS.forEach(t=>{
    document.getElementById(VIEWS[t]).style.display = (t===id)?'block':'none';
    document.getElementById(t).style.background = (t===id)?'#24292E':'#EDE8DA';
    document.getElementById(t).style.color = (t===id)?'#F8F5EE':'#24292E';
  });
}
document.getElementById('tabDaily').onclick = ()=> activateTab('tabDaily');
document.getElementById('tabMonth').onclick = ()=>{
  activateTab('tabMonth');
  if(!document.getElementById('monthInput').value){
    document.getElementById('monthInput').value = todayStr().slice(0,7);

// EDIT PASSWORD PROTECTION
async function getPassword(){
  try{
    const r = await Storage.get('settings:editPassword');
    return r.value;
  }catch(e){
    return null;
  }
}
async function changePassword(){
  const current = await getPassword();
  if(current){
    const check = prompt('Enter current password to change it:');
    if(check !== current){ alert('Incorrect password.'); return; }
  }
  const next = prompt('Set a new edit password:');
  if(!next) return;
  await Storage.set('settings:editPassword', next);
  alert('Edit password updated.');
}
async function editDay(date){
  const pass = await getPassword();
  if(pass){
    const entered = prompt('Enter password to edit '+dmy(date)+':');
    if(entered !== pass){ alert('Incorrect password.'); return; }
  }
  activateTab('tabDaily');
  document.getElementById('dateInput').value = date;
  await loadDay();
  const banner = document.getElementById('editBanner');
  banner.style.display = 'block';
  banner.textContent = 'Editing a previously submitted entry for '+dmy(date)+'. Save to update it.';
}
let expenses = [];
function inr(n){
  return '₹' + (Number(n)||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function renderExpenses(){
  const total = expenses.reduce((a,e)=>a+e.amount,0);
  document.getElementById('expTotal').textContent = inr(total);
  document.getElementById('expList').innerHTML = expenses.length ? expenses.map((e,i)=>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid #EDE8DA;font-size:14px;">
      <span>${e.desc}</span>
      <span style="display:flex;align-items:center;gap:10px;"><b>${inr(e.amount)}</b> <span onclick="expenses.splice(${i},1);renderExpenses();" style="cursor:pointer;color:#E24B4A;font-weight:700;">×</span></span>
    </div>`
  ).join('') : '<p style="color:#888780;font-size:13px;">No expenses added yet.</p>';
}
function addExpense(){
  const desc = document.getElementById('expDesc').value.trim();
  const amt = +document.getElementById('expAmount').value;
  if(desc && amt>0){
    expenses.push({desc, amount:amt});
    document.getElementById('expDesc').value='';
    document.getElementById('expAmount').value='';
    renderExpenses();
  }
}

let couriers = [];
function renderCouriers(){
  document.getElementById('courList').innerHTML = couriers.length ? couriers.map((c,i)=>
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid #DCEFEE;font-size:14px;">
      <span>${c.sender} <span style="color:#5F5E5A;">— ${c.boxes} box(es)/bag(s), ${c.company}</span></span>
      <span onclick="couriers.splice(${i},1);renderCouriers();" style="cursor:pointer;color:#E24B4A;font-weight:700;">×</span>
    </div>`
  ).join('') : '<p style="color:#888780;font-size:13px;">No courier deliveries logged yet.</p>';
}
function addCourier(){
  const sender = document.getElementById('courSender').value.trim();
  const boxes = +document.getElementById('courBoxes').value;
  const company = document.getElementById('courCompany').value.trim();
  if(sender && boxes>0 && company){
    couriers.push({sender, boxes, company});
    document.getElementById('courSender').value='';
    document.getElementById('courBoxes').value='';
    document.getElementById('courCompany').value='';
    renderCouriers();
  }
}

async function loadMonth(){
  const ym = document.getElementById('monthInput').value;
  if(!ym) return;
  document.getElementById('monthSummary').innerHTML = 'Loading...';
  document.getElementById('monthTable').innerHTML = '';
  let keys = [];
  try{
    const r = await Storage.list('attendance:'+ym);
    keys = r.keys || [];
  }catch(e){}

  if(keys.length===0){
    document.getElementById('monthSummary').innerHTML = '<p style="color:#888780;font-size:13px;">No entries saved for this month yet.</p>';
    return;
  }

  const rows = [];
  let teaTotalMonth = 0;
  let expenseTotalMonth = 0;
  const expenseRows = [];
  const courierRows = [];

  for(const k of keys.sort()){
    try{
      const r = await Storage.get(k);
      const data = JSON.parse(r.value);
      const date = k.split(':')[1];
      const m = data.tea?.morning||0, e2 = data.tea?.evening||0, s2 = data.tea?.sir||0;
      const t = m+e2+s2;
      teaTotalMonth += t;
      const expSum = (data.expenses||[]).reduce((a,e)=>a+e.amount,0);
      expenseTotalMonth += expSum;
      (data.expenses||[]).forEach(exp=> expenseRows.push({date, desc:exp.desc, amount:exp.amount}));
      (data.couriers||[]).forEach(c=> courierRows.push({date, sender:c.sender, boxes:c.boxes, company:c.company}));

      let absentN=0, lateN=0, halfN=0;
      const statusByEmployee = {};
      EMPLOYEES.forEach(n=>{
        const st = data.state?.[n]?.status || 'present';
        const tm = data.state?.[n]?.time || '';
        statusByEmployee[n] = {status: st, time: tm};
        if(st==='absent'){ absentN++; }
        if(st==='late'){ lateN++; }
        if(st==='half'){ halfN++; }
      });

      const submittedTime = data.submittedAt ? new Date(data.submittedAt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : '—';
      rows.push({date, absentN, lateN, halfN, tea:t, teaMorning:m, teaEvening:e2, teaSir:s2, submittedTime, expense: expSum, statusByEmployee});
    }catch(e){}
  }

  document.getElementById('monthSummary').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;">
      <div style="background:#F1EFE8;border-radius:6px;padding:10px;text-align:center;"><div style="font-size:12px;color:#5F5E5A;">Days logged</div><div style="font-size:20px;font-weight:600;">${rows.length}</div></div>
      <div style="background:#F1EFE8;border-radius:6px;padding:10px;text-align:center;"><div style="font-size:12px;color:#5F5E5A;">Tea (month)</div><div style="font-size:20px;font-weight:600;">${teaTotalMonth}</div></div>
      <div style="background:#F1EFE8;border-radius:6px;padding:10px;text-align:center;"><div style="font-size:12px;color:#5F5E5A;">Expenses (month)</div><div style="font-size:20px;font-weight:600;">${inr(expenseTotalMonth)}</div></div>
      <div style="background:#F1EFE8;border-radius:6px;padding:10px;text-align:center;"><div style="font-size:12px;color:#5F5E5A;">Employees tracked</div><div style="font-size:20px;font-weight:600;">${EMPLOYEES.length}</div></div>
    </div>
  `;

  document.getElementById('calendarTable').innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;">
      <tr style="background:#24292E;color:#F8F5EE;">
        <th style="padding:6px;text-align:left;min-width:110px;">Date</th>
        ${EMPLOYEES.map(n=>`<th style="padding:6px;min-width:60px;">${n}</th>`).join('')}
      </tr>
      ${rows.map(r=>{
        const dt = new Date(r.date+'T00:00:00');
        const dayShort = dt.toLocaleDateString('en-US',{weekday:'short'});
        return `<tr style="border-bottom:1px solid #EDE8DA;">
          <td style="padding:6px;font-weight:600;">${dayShort} ${dmy(r.date)}</td>
          ${EMPLOYEES.map(n=>{
            const st = r.statusByEmployee[n];
            const c = STATUS_CELL[st.status];
            const timeLine = st.status==='late' ? `<div style="font-size:10px;">${st.time||''}</div>` : '';
            return `<td style="padding:4px;text-align:center;background:${c.bg};color:${c.text};font-weight:700;border-left:1px solid #fff;">${c.letter}${timeLine}</td>`;
          }).join('')}
        </tr>`;
      }).join('')}
    </table>
  `;

  document.getElementById('teaCalendarTable').innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <tr style="background:#24292E;color:#F8F5EE;">
        <th style="padding:6px;text-align:left;">Date</th><th style="padding:6px;">Morning</th><th style="padding:6px;">Evening</th><th style="padding:6px;">Sir</th><th style="padding:6px;">Total</th>
      </tr>
      ${rows.map(r=>{
        const dt = new Date(r.date+'T00:00:00');
        const dayShort = dt.toLocaleDateString('en-US',{weekday:'short'});
        return `<tr style="border-bottom:1px solid #F3E6C8;background:#FFFAF0;">
          <td style="padding:6px;font-weight:600;color:#633806;">${dayShort} ${dmy(r.date)}</td>
          <td style="padding:6px;text-align:center;">${r.teaMorning}</td>
          <td style="padding:6px;text-align:center;">${r.teaEvening}</td>
          <td style="padding:6px;text-align:center;">${r.teaSir}</td>
          <td style="padding:6px;text-align:center;font-weight:700;color:#854F0B;">${r.tea}</td>
        </tr>`;
      }).join('')}
    </table>
  `;

  document.getElementById('expenseTable').innerHTML = expenseRows.length ? `
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <tr style="background:#24292E;color:#F8F5EE;">
        <th style="padding:6px;text-align:left;">Date</th><th style="padding:6px;text-align:left;">Description</th><th style="padding:6px;text-align:right;">Amount</th>
      </tr>
      ${expenseRows.map(e=>`<tr style="border-bottom:1px solid #E5E1F5;background:#F7F6FE;">
        <td style="padding:6px;">${dmy(e.date)}</td>
        <td style="padding:6px;">${e.desc}</td>
        <td style="padding:6px;text-align:right;">${inr(e.amount)}</td>
      </tr>`).join('')}
      <tr style="background:#EDEBFB;font-weight:700;">
        <td style="padding:6px;" colspan="2">Total</td>
        <td style="padding:6px;text-align:right;">${inr(expenseTotalMonth)}</td>
      </tr>
    </table>
  ` : '<p style="color:#888780;font-size:13px;">No expenses logged this month.</p>';

  document.getElementById('courierTable').innerHTML = courierRows.length ? `
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <tr style="background:#24292E;color:#F8F5EE;">
        <th style="padding:6px;text-align:left;">Date</th><th style="padding:6px;text-align:left;">Sender Name</th><th style="padding:6px;">Boxes/ Bags</th><th style="padding:6px;text-align:left;">Courier Company</th>
      </tr>
      ${courierRows.map(c=>`<tr style="border-bottom:1px solid #D5EFED;background:#EFFAF9;">
        <td style="padding:6px;">${dmy(c.date)}</td>
        <td style="padding:6px;">${c.sender}</td>
        <td style="padding:6px;text-align:center;">${c.boxes}</td>
        <td style="padding:6px;">${c.company}</td>
      </tr>`).join('')}
    </table>
  ` : '<p style="color:#888780;font-size:13px;">No courier deliveries logged this month.</p>';

  document.getElementById('monthTable').innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:13px;">
      <tr style="background:#24292E;color:#F8F5EE;"><th style="padding:6px;text-align:left;">Date</th><th style="padding:6px;">Absent</th><th style="padding:6px;">Late</th><th style="padding:6px;">Half day</th><th style="padding:6px;">Tea</th><th style="padding:6px;">Expenses</th><th style="padding:6px;">Submitted at</th><th style="padding:6px;">Edit</th></tr>
      ${rows.map(r=>`<tr style="border-bottom:1px solid #D9D2C0;"><td style="padding:6px;">${dmy(r.date)}</td><td style="padding:6px;text-align:center;">${r.absentN}</td><td style="padding:6px;text-align:center;">${r.lateN}</td><td style="padding:6px;text-align:center;">${r.halfN}</td><td style="padding:6px;text-align:center;">${r.tea}</td><td style="padding:6px;text-align:center;">${inr(r.expense)}</td><td style="padding:6px;text-align:center;">${r.submittedTime}</td><td style="padding:6px;text-align:center;"><button onclick="editDay('${r.date}')" style="padding:4px 10px;border:1px solid #B4B2A9;background:#fff;border-radius:4px;cursor:pointer;font-size:12px;">Edit</button></td></tr>`).join('')}
    </table>
  `;
}

renderGrid();
loadDay();
</script>
